<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f7f0df">
<title>三年级语文知识复习小游戏</title>
<style>
  :root {
    color-scheme: light;
    --paper: #f7f0df;
    --paper-deep: #eadbb8;
    --ink: #29251f;
    --muted: #71675a;
    --jade: #2f8d78;
    --jade-soft: #d8eee8;
    --cinnabar: #c94a38;
    --cinnabar-soft: #f6d7cb;
    --gold: #e5a93d;
    --gold-soft: #f8e4a7;
    --sky: #4c87a8;
    --sky-soft: #d9edf2;
    --plum: #7e4c73;
    --right: #26855f;
    --wrong: #bf3d3d;
    --line: rgba(41, 37, 31, 0.18);
    --shadow: 0 18px 42px rgba(80, 56, 31, 0.18);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    min-height: 100%;
    margin: 0;
  }

  body {
    color: var(--ink);
    font-family: "Kaiti SC", "STKaiti", "PingFang SC", "Microsoft YaHei", sans-serif;
    letter-spacing: 0;
    background:
      linear-gradient(120deg, rgba(47, 141, 120, 0.18) 0 15%, transparent 15% 32%, rgba(201, 74, 56, 0.16) 32% 45%, transparent 45%),
      radial-gradient(circle at 18% 12%, rgba(229, 169, 61, 0.28), transparent 24%),
      radial-gradient(circle at 84% 18%, rgba(76, 135, 168, 0.22), transparent 28%),
      linear-gradient(180deg, #fbf7ea 0%, #ecdfbf 100%);
    overflow-x: hidden;
  }

  button {
    min-height: 46px;
    border: 0;
    border-radius: 8px;
    color: inherit;
    font: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  button:focus-visible {
    outline: 4px solid rgba(76, 135, 168, 0.35);
    outline-offset: 3px;
  }

  .shell {
    position: relative;
    width: min(1100px, 100%);
    min-height: 100dvh;
    margin: 0 auto;
    padding: 18px;
    display: grid;
    align-items: center;
    isolation: isolate;
  }

  .backdrop {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
  }

  .backdrop svg {
    width: 100%;
    height: 100%;
    min-width: 980px;
    display: block;
  }

  .cloud {
    fill: rgba(255, 255, 255, 0.62);
  }

  .bamboo {
    fill: none;
    stroke: rgba(47, 141, 120, 0.26);
    stroke-linecap: round;
    stroke-width: 14;
  }

  .leaf {
    fill: rgba(47, 141, 120, 0.22);
  }

  .seal {
    fill: rgba(201, 74, 56, 0.18);
  }

  .panel {
    position: relative;
    width: 100%;
    min-height: min(780px, calc(100dvh - 36px));
    border: 2px solid rgba(41, 37, 31, 0.28);
    border-radius: 8px;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0)),
      repeating-linear-gradient(0deg, rgba(92, 68, 42, 0.045) 0 1px, transparent 1px 32px),
      var(--paper);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .panel::before {
    content: "";
    position: absolute;
    inset: 13px;
    border: 1px solid rgba(41, 37, 31, 0.16);
    border-radius: 8px;
    pointer-events: none;
  }

  .topbar {
    position: relative;
    z-index: 1;
    min-height: 84px;
    padding: 22px 26px 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 14px;
    align-items: start;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }

  .brand-mark {
    width: 58px;
    height: 58px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: var(--cinnabar);
    color: #fff8ed;
    display: grid;
    place-items: center;
    font-weight: 900;
    font-size: 30px;
    box-shadow: 5px 5px 0 rgba(41, 37, 31, 0.18);
    transform: rotate(-3deg);
  }

  .eyebrow {
    margin: 0 0 2px;
    color: var(--plum);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    font-weight: 800;
  }

  h1,
  h2 {
    margin: 0;
    line-height: 1.12;
  }

  h1 {
    font-size: clamp(30px, 5vw, 52px);
  }

  .scoreboard {
    display: grid;
    grid-template-columns: repeat(3, minmax(74px, auto));
    gap: 8px;
  }

  .score-pill {
    border: 1px solid rgba(41, 37, 31, 0.26);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.55);
    padding: 8px 10px;
    text-align: center;
    box-shadow: 3px 3px 0 rgba(41, 37, 31, 0.08);
  }

  .score-pill span {
    display: block;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 12px;
    font-weight: 700;
  }

  .score-pill strong {
    display: block;
    margin-top: 1px;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 18px;
    font-weight: 900;
  }

  .screen {
    position: relative;
    z-index: 1;
    min-height: 600px;
    padding: 4px 26px 26px;
  }

  .hidden {
    display: none !important;
  }

  .start-grid {
    min-height: 560px;
    display: grid;
    grid-template-columns: minmax(0, 0.92fr) minmax(320px, 1.08fr);
    gap: 24px;
    align-items: center;
  }

  .scroll-hero {
    position: relative;
    min-height: 520px;
    display: grid;
    align-content: center;
    gap: 18px;
  }

  .hero-art {
    width: min(360px, 88vw);
    aspect-ratio: 1;
    margin: 0 auto;
    display: block;
    filter: drop-shadow(0 18px 20px rgba(80, 56, 31, 0.16));
  }

  .intro-copy {
    max-width: 430px;
    margin: 0 auto;
    text-align: center;
  }

  .intro-copy h2 {
    font-size: clamp(28px, 4.6vw, 46px);
  }

  .intro-copy p {
    margin: 10px 0 0;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.7;
  }

  .mode-board {
    display: grid;
    gap: 12px;
  }

  .mode-button {
    min-height: 100px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: #fff8e9;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 52px 1fr auto;
    gap: 12px;
    align-items: center;
    text-align: left;
    box-shadow: 5px 5px 0 rgba(41, 37, 31, 0.16);
    transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.2s ease;
  }

  .mode-button:hover {
    transform: translate(-1px, -1px);
    box-shadow: 7px 7px 0 rgba(41, 37, 31, 0.14);
  }

  .mode-button:active {
    transform: translate(4px, 4px);
    box-shadow: 1px 1px 0 rgba(41, 37, 31, 0.16);
  }

  .mode-button:nth-child(2) {
    background: var(--jade-soft);
  }

  .mode-button:nth-child(3) {
    background: var(--sky-soft);
  }

  .mode-button:nth-child(4) {
    background: var(--cinnabar-soft);
  }

  .mode-icon {
    width: 52px;
    height: 52px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.72);
    display: grid;
    place-items: center;
    color: var(--cinnabar);
    font-size: 24px;
    font-weight: 900;
  }

  .mode-title {
    display: block;
    font-size: 24px;
    font-weight: 900;
  }

  .mode-detail {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.45;
  }

  .mode-arrow {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 28px;
    font-weight: 900;
  }

  .progress-line {
    height: 14px;
    margin: 0 0 16px;
    border: 2px solid var(--ink);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.62);
    overflow: hidden;
  }

  .progress-line i {
    display: block;
    width: 0;
    height: 100%;
    background: linear-gradient(90deg, var(--jade), var(--gold), var(--cinnabar));
    transition: width 0.28s ease;
  }

  .quiz-layout {
    display: grid;
    grid-template-columns: 240px minmax(0, 1fr);
    gap: 18px;
    align-items: stretch;
  }

  .side-panel,
  .question-panel {
    border: 2px solid rgba(41, 37, 31, 0.32);
    border-radius: 8px;
    background: rgba(255, 252, 242, 0.82);
    box-shadow: 5px 5px 0 rgba(41, 37, 31, 0.1);
  }

  .side-panel {
    min-height: 430px;
    padding: 18px;
    display: grid;
    align-content: start;
    gap: 14px;
  }

  .round-badge {
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: var(--gold-soft);
    padding: 14px;
    text-align: center;
  }

  .round-badge span {
    display: block;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    font-weight: 800;
  }

  .round-badge strong {
    display: block;
    margin-top: 4px;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 30px;
    font-weight: 900;
  }

  .mini-map {
    display: grid;
    gap: 8px;
  }

  .mini-step {
    height: 12px;
    border: 1px solid rgba(41, 37, 31, 0.28);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.65);
  }

  .mini-step.done {
    background: var(--jade);
  }

  .mini-step.wrong {
    background: var(--wrong);
  }

  .quote-box {
    margin-top: auto;
    border-left: 5px solid var(--cinnabar);
    background: rgba(255, 255, 255, 0.52);
    padding: 12px 12px 12px 14px;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.65;
  }

  .question-panel {
    min-height: 430px;
    padding: clamp(18px, 3vw, 34px);
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 16px;
  }

  .question-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .tag {
    border: 1px solid rgba(41, 37, 31, 0.26);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.7);
    padding: 5px 10px;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    font-weight: 800;
  }

  .tag.type {
    color: #fff;
    background: var(--plum);
    border-color: var(--plum);
  }

  .question-text {
    min-height: 96px;
    display: flex;
    align-items: center;
    font-size: clamp(30px, 5vw, 54px);
    font-weight: 900;
    line-height: 1.24;
  }

  .question-text small {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    font-weight: 700;
  }

  .options {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    align-content: center;
  }

  .option {
    min-height: 84px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: #fffdf6;
    padding: 12px;
    display: grid;
    place-items: center;
    text-align: center;
    font-size: clamp(21px, 3.3vw, 34px);
    font-weight: 900;
    line-height: 1.18;
    box-shadow: 4px 4px 0 rgba(41, 37, 31, 0.16);
    transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s ease;
  }

  .option small {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    font-weight: 700;
  }

  .option:hover:not(:disabled) {
    transform: translate(-1px, -1px);
  }

  .option:active:not(:disabled) {
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0 rgba(41, 37, 31, 0.16);
  }

  .option.correct {
    color: #fff;
    background: var(--right);
    border-color: #1d674b;
  }

  .option.wrong {
    color: #fff;
    background: var(--wrong);
    border-color: #862828;
  }

  .option.dim {
    opacity: 0.5;
  }

  .option:disabled {
    cursor: default;
  }

  .feedback {
    min-height: 74px;
    border: 1px solid rgba(41, 37, 31, 0.22);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.68);
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-weight: 800;
    line-height: 1.5;
  }

  .feedback strong {
    color: var(--ink);
  }

  .next-button,
  .tool-button {
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: var(--gold);
    padding: 0 18px;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-weight: 900;
    box-shadow: 3px 3px 0 rgba(41, 37, 31, 0.14);
  }

  .tool-button {
    min-height: 42px;
    background: rgba(255, 255, 255, 0.65);
    padding: 0 14px;
  }

  .result-wrap {
    min-height: 560px;
    display: grid;
    grid-template-columns: minmax(260px, 0.86fr) minmax(0, 1.14fr);
    gap: 24px;
    align-items: center;
  }

  .result-seal {
    min-height: 420px;
    display: grid;
    place-items: center;
    text-align: center;
  }

  .big-score {
    width: min(320px, 82vw);
    aspect-ratio: 1;
    border: 8px double var(--cinnabar);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.45);
    display: grid;
    place-items: center;
    transform: rotate(-4deg);
  }

  .big-score strong {
    display: block;
    color: var(--cinnabar);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: clamp(56px, 11vw, 102px);
    line-height: 0.95;
  }

  .big-score span {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 18px;
    font-weight: 900;
  }

  .result-detail {
    display: grid;
    gap: 14px;
  }

  .result-detail h2 {
    font-size: clamp(30px, 5vw, 52px);
  }

  .result-detail p {
    margin: 0;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    font-weight: 800;
    line-height: 1.7;
  }

  .wrong-list {
    display: grid;
    gap: 8px;
    max-height: 220px;
    overflow: auto;
    padding-right: 4px;
  }

  .wrong-item {
    border: 1px solid rgba(41, 37, 31, 0.22);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.58);
    padding: 9px 11px;
    color: var(--muted);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.45;
  }

  .wrong-item strong {
    color: var(--ink);
  }

  .result-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 6px;
  }

  .primary-action {
    min-width: 152px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: var(--cinnabar);
    color: #fff8ed;
    padding: 0 20px;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-weight: 900;
    box-shadow: 4px 4px 0 rgba(41, 37, 31, 0.16);
  }

  .secondary-action {
    min-width: 132px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.68);
    padding: 0 18px;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-weight: 900;
    box-shadow: 4px 4px 0 rgba(41, 37, 31, 0.12);
  }

  .burst {
    position: fixed;
    left: var(--x);
    top: var(--y);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color);
    pointer-events: none;
    animation: burst 740ms ease-out forwards;
    z-index: 10;
  }

  @keyframes burst {
    from {
      transform: translate(0, 0) scale(1);
      opacity: 1;
    }
    to {
      transform: translate(var(--dx), var(--dy)) scale(0.2);
      opacity: 0;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 860px) {
    .topbar,
    .start-grid,
    .quiz-layout,
    .result-wrap {
      grid-template-columns: 1fr;
    }

    .scoreboard {
      grid-template-columns: repeat(3, 1fr);
    }

    .side-panel {
      min-height: auto;
    }

    .quote-box {
      margin-top: 0;
    }

    .mini-map {
      grid-template-columns: repeat(12, 1fr);
    }
  }

  @media (max-width: 560px) {
    .shell {
      padding: 10px;
      align-items: stretch;
    }

    .panel {
      min-height: calc(100dvh - 20px);
    }

    .topbar {
      padding: 18px 18px 8px;
    }

    .screen {
      min-height: auto;
      padding: 4px 18px 20px;
    }

    .brand-mark {
      width: 50px;
      height: 50px;
      font-size: 25px;
    }

    .mode-button {
      grid-template-columns: 44px 1fr;
      min-height: 92px;
    }

    .mode-arrow {
      display: none;
    }

    .mode-icon {
      width: 44px;
      height: 44px;
      font-size: 21px;
    }

    .mode-title {
      font-size: 21px;
    }

    .options {
      grid-template-columns: 1fr;
    }

    .question-text {
      min-height: 76px;
    }

    .feedback {
      grid-template-columns: 1fr;
    }

    .next-button {
      width: 100%;
    }
  }
</style>
</head>
<body>
<div class="backdrop" aria-hidden="true">
  <svg viewBox="0 0 1200 760" focusable="false">
    <path class="cloud" d="M86 128c28-42 82-34 98 8 42-22 92 2 96 48H42c4-32 20-50 44-56z"/>
    <path class="cloud" d="M962 116c30-48 94-38 112 10 46-26 100 4 104 54H904c6-34 26-55 58-64z"/>
    <path class="bamboo" d="M90 720C112 540 124 330 106 80"/>
    <path class="bamboo" d="M1110 732c-38-206-42-430-10-640"/>
    <path class="leaf" d="M114 212c78-42 134-24 176 18-82 14-132 12-176-18z"/>
    <path class="leaf" d="M1064 292c-92-32-148-8-184 42 92 4 146-8 184-42z"/>
    <circle class="seal" cx="238" cy="610" r="118"/>
    <circle class="seal" cx="970" cy="568" r="86"/>
  </svg>
</div>

<main class="shell">
  <section class="panel" aria-label="三年级语文知识复习小游戏">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">语</div>
        <div>
          <p class="eyebrow">三年级下册知识点</p>
          <h1>语文星桥</h1>
        </div>
      </div>
      <div class="scoreboard" aria-label="成绩">
        <div class="score-pill"><span>得分</span><strong id="scoreText">0</strong></div>
        <div class="score-pill"><span>连对</span><strong id="streakText">0</strong></div>
        <div class="score-pill"><span>题目</span><strong id="roundText">0/12</strong></div>
      </div>
    </header>

    <section class="screen" id="startScreen">
      <div class="start-grid">
        <div class="scroll-hero">
          <svg class="hero-art" viewBox="0 0 360 360" role="img" aria-label="书卷和星桥">
            <defs>
              <linearGradient id="paperGrad" x1="0" x2="1" y1="0" y2="1">
                <stop stop-color="#fff9e9"/>
                <stop offset="1" stop-color="#ecd9a9"/>
              </linearGradient>
            </defs>
            <path d="M76 82h210c16 0 30 14 30 30v144c0 16-14 30-30 30H76c-16 0-30-14-30-30V112c0-16 14-30 30-30z" fill="url(#paperGrad)" stroke="#29251f" stroke-width="5"/>
            <path d="M98 120h156M98 156h120M98 192h146M98 228h92" stroke="#7e4c73" stroke-width="8" stroke-linecap="round"/>
            <path d="M56 280c66-42 168-42 244 0" fill="none" stroke="#2f8d78" stroke-width="13" stroke-linecap="round"/>

let state = createFreshState();
let soundEnabled = loadSoundPreference();
const soundPlayers = new Map();

function q(unit, type, level, prompt, answer, options, explain) {
  return {
    id: `${unit}-${type}-${prompt}`,
    unit,
    type,
    level,
    prompt,
    answer,
    options,
    explain,
  };
}

function createFreshState() {
  return {
    mode: MODES[0],
    queue: [],
    current: null,
    round: 0,
    score: 0,
    streak: 0,
    bestStreak: 0,
    answered: [],
    wrong: [],
    locked: false,
  };
}

function shuffle(list) {
  const items = [...list];
  for (let index = items.length - 1; index > 0; index -= 1) {
    const swap = Math.floor(Math.random() * (index + 1));
    [items[index], items[swap]] = [items[swap], items[index]];
  }
  return items;
}

function renderModes() {
  els.modeBoard.innerHTML = MODES.map((mode) => `
    <button class="mode-button" type="button" data-mode="${mode.id}">
      <span class="mode-icon">${mode.mark}</span>
      <span>
        <span class="mode-title">${mode.title}</span>
        <span class="mode-detail">${mode.detail}</span>
      </span>
      <span class="mode-arrow">›</span>
    </button>
  `).join("");
}

function startGame(modeId = "all") {
  playSound("click");
  const mode = MODES.find((item) => item.id === modeId) || MODES[0];
  const pool = QUESTIONS.filter(mode.filter);
  const savedWrongIds = loadWrongIds();
  const wrongFirst = savedWrongIds
    .map((id) => pool.find((question) => question.id === id))
    .filter(Boolean);
  const rest = shuffle(pool.filter((question) => !savedWrongIds.includes(question.id)));

  state = createFreshState();
  state.mode = mode;
  state.queue = shuffle([...wrongFirst, ...rest]).slice(0, ROUND_TOTAL);
  if (state.queue.length < ROUND_TOTAL) {
    state.queue = shuffle(pool).slice(0, ROUND_TOTAL);
  }

  els.startScreen.classList.add("hidden");
  els.resultScreen.classList.add("hidden");
  els.quizScreen.classList.remove("hidden");
  nextQuestion();
}

function nextQuestion() {
  if (state.round >= ROUND_TOTAL || state.round >= state.queue.length) {
    finishGame();
    return;
  }

  state.current = state.queue[state.round];
  state.locked = false;
  state.round += 1;
  renderQuestion();
}

function renderQuestion() {
  const question = state.current;
  const options = shuffle(question.options);

  els.feedbackBox.classList.add("hidden");
  els.feedbackText.innerHTML = "";
  els.modeLabel.textContent = state.mode.title;
  els.scoreText.textContent = state.score;
  els.streakText.textContent = state.streak;
  els.roundText.textContent = `${state.round}/${ROUND_TOTAL}`;
  els.roundBig.textContent = state.round;
  els.progressFill.style.width = `${((state.round - 1) / ROUND_TOTAL) * 100}%`;
  els.quoteBox.textContent = QUOTES[(state.round - 1) % QUOTES.length];
  els.typeTag.textContent = question.type;
  els.unitTag.textContent = `第${toChineseNumber(question.unit)}单元`;
  els.levelTag.textContent = question.level;
  els.questionText.innerHTML = `${question.prompt}<small>${question.type} · ${question.level}</small>`;
  els.optionsBox.innerHTML = options.map((option) => `
    <button class="option" type="button" data-answer="${escapeAttr(option)}">${option}</button>
  `).join("");
  renderMiniMap();
}

function renderMiniMap() {
  const steps = [];
  for (let index = 0; index < ROUND_TOTAL; index += 1) {
    const record = state.answered[index];
    const className = record ? (record.correct ? "mini-step done" : "mini-step wrong") : "mini-step";
    steps.push(`<span class="${className}"></span>`);
  }
  els.miniMap.innerHTML = steps.join("");
}

function answerQuestion(choice, button) {
  if (state.locked) {
    return;
  }

  playSound("click");
  state.locked = true;
  const question = state.current;
  const correct = choice === question.answer;
  const buttons = [...els.optionsBox.querySelectorAll(".option")];

  buttons.forEach((item) => {
    item.disabled = true;
    const value = item.dataset.answer;
    if (value === question.answer) {
      item.classList.add("correct");
    } else if (item === button) {
      item.classList.add("wrong");
    } else {
      item.classList.add("dim");
    }
  });

  if (correct) {
    state.score += 1;
    state.streak += 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    window.setTimeout(() => playSound("correct"), 90);
    popBurst();
  } else {
    state.streak = 0;
    state.wrong.push({ ...question, choice });
    window.setTimeout(() => playSound("wrong"), 90);
  }

  state.answered.push({ id: question.id, correct });
  els.scoreText.textContent = state.score;
  els.streakText.textContent = state.streak;
  els.progressFill.style.width = `${(state.round / ROUND_TOTAL) * 100}%`;
  renderMiniMap();
  showFeedback(correct, question, choice);
}

function showFeedback(correct, question, choice) {
  const title = correct ? "答对了" : "再看一眼";
  const detail = correct
    ? question.explain
    : `你选了“${choice}”。正确答案是“${question.answer}”。${question.explain}`;
  els.feedbackText.innerHTML = `<strong>${title}</strong><br>${detail}`;
  els.feedbackBox.classList.remove("hidden");
}

function finishGame() {
  saveWrongIds(state.wrong.map((item) => item.id));
  const best = loadBest();
  const nextBest = Math.max(best, state.score);
  saveBest(nextBest);

  const rate = Math.round((state.score / ROUND_TOTAL) * 100);
  els.quizScreen.classList.add("hidden");
  els.resultScreen.classList.remove("hidden");
  els.finalScore.textContent = `${state.score}/${ROUND_TOTAL}`;
  els.finalRate.textContent = `正确率 ${rate}%`;
  els.resultTitle.textContent = rate >= 90 ? "星印满满" : rate >= 70 ? "已经过桥" : "继续练习";
  els.resultSummary.textContent = `最高分 ${nextBest}/${ROUND_TOTAL}，本局最长连对 ${state.bestStreak} 题。`;
  els.wrongList.innerHTML = state.wrong.length
    ? state.wrong.map((item) => `
        <div class="wrong-item">
          <strong>${item.prompt}</strong><br>
          你选：${item.choice}；正确：${item.answer}<br>
          ${item.explain}
        </div>
      `).join("")
    : `<div class="wrong-item"><strong>本局没有错题。</strong><br>可以换一个关卡继续巩固。</div>`;
  playSound("finale");
}

function goHome() {
  playSound("click");
  stopSpeech();
  els.quizScreen.classList.add("hidden");
  els.resultScreen.classList.add("hidden");
  els.startScreen.classList.remove("hidden");
  state = createFreshState();
  els.scoreText.textContent = "0";
  els.streakText.textContent = "0";
  els.roundText.textContent = "0/12";
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  saveSoundPreference();
  updateSoundButton();
  if (soundEnabled) {
    playSound("click");
  }
}

function updateSoundButton() {
  els.soundButton.textContent = soundEnabled ? "音效：开" : "音效：关";
  els.soundButton.setAttribute("aria-pressed", String(soundEnabled));
}

function playSound(name) {
  if (!soundEnabled || typeof Audio === "undefined") {
    return;
  }

  const src = SOUND_ASSETS[name];
  if (!src) {
    return;
  }

  let player = soundPlayers.get(name);
  if (!player) {
    player = new Audio(src);
    player.preload = "auto";
    player.volume = name === "finale" ? 0.74 : 0.9;
    soundPlayers.set(name, player);
  }

  try {
    player.currentTime = 0;
    const playback = player.play();
    if (playback && typeof playback.catch === "function") {
      playback.catch(() => {});
    }
  } catch {
    // Browsers may block sound before the first user gesture.
  }
}

function speakCurrent() {
  if (!state.current || !("speechSynthesis" in window)) {
    return;
  }
  stopSpeech();
  const text = `${state.current.prompt}。选项：${state.current.options.join("，")}。`;
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "zh-CN";
  utterance.rate = 0.88;
  window.speechSynthesis.speak(utterance);
}

function stopSpeech() {
  if ("speechSynthesis" in window) {
    window.speechSynthesis.cancel();
  }
}

function popBurst() {
  const colors = ["#c94a38", "#2f8d78", "#e5a93d", "#4c87a8", "#7e4c73"];
  for (let index = 0; index < 18; index += 1) {
    const bit = document.createElement("span");
    const angle = (Math.PI * 2 * index) / 18;
    const distance = 58 + Math.random() * 50;
    bit.className = "burst";
    bit.style.setProperty("--x", `${50 + (Math.random() - 0.5) * 10}vw`);
    bit.style.setProperty("--y", `${46 + (Math.random() - 0.5) * 10}vh`);
    bit.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
    bit.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
    bit.style.setProperty("--color", colors[index % colors.length]);
    document.body.appendChild(bit);
    window.setTimeout(() => bit.remove(), 760);
  }
}

function toChineseNumber(value) {
  return ["零", "一", "二", "三", "四", "五", "六", "七", "八"][value] || value;
}

function escapeAttr(value) {
  return String(value).replace(/"/g, "&quot;");
}

function loadWrongIds() {
  try {
    const stored = JSON.parse(window.localStorage.getItem(STORE_KEY) || "{}");
    return Array.isArray(stored.wrongIds) ? stored.wrongIds : [];
  } catch {
    return [];
  }
}

function saveWrongIds(wrongIds) {
  try {
    const stored = JSON.parse(window.localStorage.getItem(STORE_KEY) || "{}");
    window.localStorage.setItem(STORE_KEY, JSON.stringify({ ...stored, wrongIds }));
  } catch {
    // The game still works without local storage.
  }
}

function loadBest() {
  try {
    const stored = JSON.parse(window.localStorage.getItem(STORE_KEY) || "{}");
    return Number.isFinite(stored.best) ? stored.best : 0;
  } catch {
    return 0;
  }
}

function saveBest(best) {
  try {
    const stored = JSON.parse(window.localStorage.getItem(STORE_KEY) || "{}");
    window.localStorage.setItem(STORE_KEY, JSON.stringify({ ...stored, best }));
  } catch {
    // The game still works without local storage.
  }
}

function loadSoundPreference() {
  try {
    const stored = JSON.parse(window.localStorage.getItem(STORE_KEY) || "{}");
    return stored.soundEnabled === undefined ? true : stored.soundEnabled === true;
  } catch {
    return true;
  }
}

function saveSoundPreference() {
  try {
    const stored = JSON.parse(window.localStorage.getItem(STORE_KEY) || "{}");
    window.localStorage.setItem(STORE_KEY, JSON.stringify({ ...stored, soundEnabled }));
  } catch {
    // Sound preference is optional.
  }
}

renderModes();
updateSoundButton();

els.modeBoard.addEventListener("click", (event) => {
  const button = event.target.closest("[data-mode]");
  if (!button) {
    return;
  }
  startGame(button.dataset.mode);
});

els.optionsBox.addEventListener("click", (event) => {
  const button = event.target.closest(".option");
  if (!button) {
    return;
  }
  answerQuestion(button.dataset.answer, button);
});

els.nextButton.addEventListener("click", () => {
  playSound("click");
  stopSpeech();
  nextQuestion();
});

els.speakButton.addEventListener("click", speakCurrent);
els.soundButton.addEventListener("click", toggleSound);
els.backButton.addEventListener("click", goHome);
els.againButton.addEventListener("click", () => startGame(state.mode.id));
els.homeButton.addEventListener("click", goHome);
</script>
</body>
</html>
