<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#eef6f0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="数学专项">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>三年级数学弱点专项小游戏</title>
<style>
  :root {
    color-scheme: light;
    --ink: #24312c;
    --muted: #65736d;
    --paper: #fffdf3;
    --mint: #dff3e8;
    --leaf: #2f8f68;
    --blue: #347aa4;
    --blue-soft: #dceffa;
    --gold: #e7ad3f;
    --gold-soft: #f9e7ae;
    --coral: #dd6645;
    --coral-soft: #f8d9cc;
    --violet: #7160a8;
    --violet-soft: #e6e1f7;
    --right: #249263;
    --wrong: #c5433e;
    --line: rgba(36, 49, 44, 0.18);
    --shadow: 0 20px 50px rgba(45, 70, 56, 0.18);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    min-height: 100%;
    margin: 0;
  }

  body {
    color: var(--ink);
    font-family: "PingFang SC", "Microsoft YaHei", "Yuanti SC", sans-serif;
    letter-spacing: 0;
    background:
      linear-gradient(118deg, rgba(47, 143, 104, 0.2) 0 18%, transparent 18% 35%, rgba(52, 122, 164, 0.16) 35% 52%, transparent 52%),
      radial-gradient(circle at 12% 16%, rgba(231, 173, 63, 0.3), transparent 26%),
      radial-gradient(circle at 86% 12%, rgba(221, 102, 69, 0.23), transparent 28%),
      linear-gradient(180deg, #f7fbef 0%, #e9f4ef 58%, #eaf1dc 100%);
    overflow-x: hidden;
  }

  button {
    min-height: 48px;
    border: 0;
    border-radius: 8px;
    color: inherit;
    font: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  button:focus-visible {
    outline: 4px solid rgba(52, 122, 164, 0.36);
    outline-offset: 3px;
  }

  .shell {
    width: min(1180px, 100%);
    min-height: 100dvh;
    margin: 0 auto;
    padding: 16px;
    display: grid;
    align-items: center;
  }

  .app {
    position: relative;
    width: 100%;
    min-height: min(820px, calc(100dvh - 32px));
    border: 3px solid rgba(36, 49, 44, 0.82);
    border-radius: 10px;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0)),
      repeating-linear-gradient(0deg, rgba(36, 49, 44, 0.045) 0 1px, transparent 1px 34px),
      var(--paper);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .app::before {
    content: "";
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(36, 49, 44, 0.14);
    border-radius: 8px;
    pointer-events: none;
  }

  .topbar {
    position: relative;
    z-index: 1;
    padding: 20px 26px 8px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 14px;
    align-items: start;
  }

  .brand {
    display: flex;
    gap: 14px;
    align-items: center;
    min-width: 0;
  }

  .brand-icon {
    width: 62px;
    height: 62px;
    border: 3px solid var(--ink);
    border-radius: 8px;
    background: var(--leaf);
    color: #fff;
    display: grid;
    place-items: center;
    font-size: 34px;
    font-weight: 900;
    box-shadow: 5px 5px 0 rgba(36, 49, 44, 0.14);
    transform: rotate(-4deg);
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--blue);
    font-size: 13px;
    font-weight: 900;
  }

  h1,
  h2 {
    margin: 0;
    line-height: 1.12;
  }

  h1 {
    font-size: clamp(30px, 4.8vw, 52px);
    font-weight: 900;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(78px, auto));
    gap: 8px;
  }

  .stat {
    border: 2px solid rgba(36, 49, 44, 0.24);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.72);
    padding: 8px 10px;
    text-align: center;
    box-shadow: 3px 3px 0 rgba(36, 49, 44, 0.08);
  }

  .stat span {
    display: block;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
  }

  .stat strong {
    display: block;
    margin-top: 1px;
    font-size: 18px;
    font-weight: 900;
  }

  .screen {
    position: relative;
    z-index: 1;
    min-height: 642px;
    padding: 6px 26px 26px;
  }

  .hidden {
    display: none !important;
  }

  .start-layout {
    min-height: 620px;
    display: grid;
    grid-template-columns: minmax(0, 0.9fr) minmax(360px, 1.1fr);
    gap: 24px;
    align-items: center;
  }

  .hero {
    display: grid;
    justify-items: center;
    gap: 18px;
    text-align: center;
  }

  .hero svg {
    width: min(390px, 88vw);
    filter: drop-shadow(0 18px 20px rgba(45, 70, 56, 0.16));
  }

  .hero h2 {
    max-width: 440px;
    font-size: clamp(30px, 5vw, 48px);
    font-weight: 900;
  }

  .hero p {
    max-width: 460px;
    margin: 0;
    color: var(--muted);
    font-size: 15px;
    font-weight: 800;
    line-height: 1.7;
  }

  .mode-grid {
    display: grid;
    gap: 12px;
  }

  .mode-card {
    min-height: 96px;
    border: 3px solid var(--ink);
    border-radius: 8px;
    background: #fffdf4;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 12px;
    align-items: center;
    text-align: left;
    box-shadow: 5px 5px 0 rgba(36, 49, 44, 0.14);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }

  .mode-card:nth-child(2) {
    background: var(--mint);
  }

  .mode-card:nth-child(3) {
    background: var(--blue-soft);
  }

  .mode-card:nth-child(4) {
    background: var(--gold-soft);
  }

  .mode-card:nth-child(5) {
    background: var(--coral-soft);
  }

  .mode-card:hover {
    transform: translate(-1px, -1px);
    box-shadow: 7px 7px 0 rgba(36, 49, 44, 0.12);
  }

  .mode-card:active {
    transform: translate(4px, 4px);
    box-shadow: 1px 1px 0 rgba(36, 49, 44, 0.14);
  }

  .mode-icon {
    width: 56px;
    height: 56px;
    border: 3px solid var(--ink);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.72);
    display: grid;
    place-items: center;
    color: var(--coral);
    font-size: 28px;
    font-weight: 900;
  }

  .mode-title {
    display: block;
    font-size: 24px;
    font-weight: 900;
  }

  .mode-detail {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
    line-height: 1.45;
  }

  .mode-arrow {
    font-size: 30px;
    font-weight: 900;
  }

  .progress {
    height: 14px;
    margin: 0 0 16px;
    border: 2px solid var(--ink);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.64);
    overflow: hidden;
  }

  .progress i {
    display: block;
    width: 0;
    height: 100%;
    background: linear-gradient(90deg, var(--leaf), var(--blue), var(--gold), var(--coral));
    transition: width 0.25s ease;
  }

  .quiz-layout {
    display: grid;
    grid-template-columns: 250px minmax(0, 1fr);
    gap: 18px;
    align-items: stretch;
  }

  .side,
  .question {
    border: 3px solid rgba(36, 49, 44, 0.44);
    border-radius: 8px;
    background: rgba(255, 253, 243, 0.86);
    box-shadow: 5px 5px 0 rgba(36, 49, 44, 0.1);
  }

  .side {
    min-height: 486px;
    padding: 16px;
    display: grid;
    gap: 12px;
    align-content: start;
  }

  .round-card {
    border: 3px solid var(--ink);
    border-radius: 8px;
    background: var(--gold-soft);
    padding: 14px;
    text-align: center;
  }

  .round-card span {
    display: block;
    color: var(--muted);
    font-size: 13px;
    font-weight: 900;
  }

  .round-card strong {
    display: block;
    margin-top: 4px;
    font-size: 30px;
    font-weight: 900;
  }

  .steps {
    display: grid;
    gap: 8px;
  }

  .step {
    height: 12px;
    border: 1px solid rgba(36, 49, 44, 0.26);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.7);
  }

  .step.good {
    background: var(--right);
  }

  .step.bad {
    background: var(--wrong);
  }

  .hint-box {
    margin-top: auto;
    border-left: 6px solid var(--leaf);
    background: rgba(255, 255, 255, 0.62);
    padding: 12px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 800;
    line-height: 1.6;
  }

  .tool-button {
    border: 3px solid var(--ink);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.72);
    padding: 0 14px;
    font-weight: 900;
    box-shadow: 3px 3px 0 rgba(36, 49, 44, 0.12);
  }

  .question {
    min-height: 486px;
    padding: clamp(18px, 3vw, 30px);
    display: grid;
    grid-template-rows: auto auto minmax(180px, 1fr) auto auto;
    gap: 14px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    border: 1px solid rgba(36, 49, 44, 0.26);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.7);
    padding: 5px 10px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 900;
  }

  .tag.primary {
    color: #fff;
    background: var(--violet);
    border-color: var(--violet);
  }

  .prompt {
    font-size: clamp(24px, 3.6vw, 42px);
    font-weight: 900;
    line-height: 1.25;
  }

  .prompt small {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 800;
  }

  .scene {
    min-height: 190px;
    border: 2px dashed rgba(36, 49, 44, 0.22);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.48);
    display: grid;
    place-items: center;
    padding: 14px;
    overflow: hidden;
  }

  .scene svg {
    max-width: 100%;
    max-height: 310px;
  }

  .word-scene {
    width: 100%;
    max-width: 650px;
    border: 3px solid var(--ink);
    border-radius: 8px;
    background: #fff9e7;
    padding: 18px;
    box-shadow: 4px 4px 0 rgba(36, 49, 44, 0.1);
    font-size: clamp(20px, 3vw, 30px);
    font-weight: 900;
    line-height: 1.5;
  }

  .word-scene em {
    color: var(--coral);
    font-style: normal;
  }

  .options {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .option {
    min-height: 76px;
    border: 3px solid var(--ink);
    border-radius: 8px;
    background: #fffdf6;
    padding: 12px;
    display: grid;
    place-items: center;
    text-align: center;
    font-size: clamp(20px, 3vw, 30px);
    font-weight: 900;
    line-height: 1.18;
    box-shadow: 4px 4px 0 rgba(36, 49, 44, 0.14);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }

  .option:hover:not(:disabled) {
    transform: translate(-1px, -1px);
  }

  .option:active:not(:disabled) {
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0 rgba(36, 49, 44, 0.14);
  }

  .option.correct {
    color: #fff;
    background: var(--right);
    border-color: #1d6e4d;
  }

  .option.wrong {
    color: #fff;
    background: var(--wrong);
    border-color: #8d2f2c;
  }

  .option.dim {
    opacity: 0.46;
  }

  .option:disabled {
    cursor: default;
  }

  .feedback {
    min-height: 74px;
    border: 2px solid rgba(36, 49, 44, 0.24);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.72);
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    color: var(--muted);
    font-weight: 800;
    line-height: 1.5;
  }

  .feedback strong {
    color: var(--ink);
  }

  .next-button,
  .primary-action,
  .secondary-action {
    border: 3px solid var(--ink);
    border-radius: 8px;
    font-weight: 900;
    box-shadow: 3px 3px 0 rgba(36, 49, 44, 0.14);
  }

  .next-button {
    background: var(--gold);
    padding: 0 18px;
  }

  .result-layout {
    min-height: 620px;
    display: grid;
    grid-template-columns: minmax(260px, 0.88fr) minmax(0, 1.12fr);
    gap: 24px;
    align-items: center;
  }

  .result-medal {
    min-height: 420px;
    display: grid;
    place-items: center;
  }

  .medal {
    width: min(330px, 82vw);
    aspect-ratio: 1;
    border: 9px double var(--gold);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.58);
    display: grid;
    place-items: center;
    text-align: center;
    transform: rotate(-4deg);
  }

  .medal strong {
    display: block;
    color: var(--coral);
    font-size: clamp(56px, 11vw, 100px);
    line-height: 0.95;
    font-weight: 900;
  }

  .medal span {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-size: 18px;
    font-weight: 900;
  }

  .result-detail {
    display: grid;
    gap: 14px;
  }

  .result-detail h2 {
    font-size: clamp(30px, 5vw, 52px);
    font-weight: 900;
  }

  .result-detail p {
    margin: 0;
    color: var(--muted);
    font-size: 16px;
    font-weight: 800;
    line-height: 1.7;
  }

  .weak-list {
    display: grid;
    gap: 8px;
    max-height: 240px;
    overflow: auto;
    padding-right: 4px;
  }

  .weak-item {
    border: 1px solid rgba(36, 49, 44, 0.22);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.62);
    padding: 9px 11px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 800;
    line-height: 1.45;
  }

  .weak-item strong {
    color: var(--ink);
  }

  .result-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .primary-action {
    min-width: 150px;
    background: var(--leaf);
    color: #fff;
    padding: 0 20px;
  }

  .secondary-action {
    min-width: 132px;
    background: rgba(255, 255, 255, 0.72);
    padding: 0 18px;
  }

  .burst {
    position: fixed;
    left: var(--x);
    top: var(--y);
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--color);
    pointer-events: none;
    animation: burst 760ms ease-out forwards;
    z-index: 20;
  }

  @keyframes burst {
    from {
      transform: translate(0, 0) scale(1);
      opacity: 1;
    }
    to {
      transform: translate(var(--dx), var(--dy)) scale(0.15);
      opacity: 0;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 920px) {
    .topbar,
    .start-layout,
    .quiz-layout,
    .result-layout {
      grid-template-columns: 1fr;
    }

    .side {
      min-height: auto;
    }

    .steps {
      grid-template-columns: repeat(12, 1fr);
    }

    .hint-box {
      margin-top: 0;
    }
  }

  @media (max-width: 560px) {
    .shell {
      padding: 10px;
      align-items: stretch;
    }

    .app {
      min-height: calc(100dvh - 20px);
    }

    .topbar {
      padding: 18px 18px 8px;
    }

    .screen {
      min-height: auto;
      padding: 4px 18px 20px;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      font-size: 28px;
    }

    .stats {
      grid-template-columns: repeat(3, 1fr);
    }

    .mode-card {
      grid-template-columns: 46px 1fr;
      min-height: 92px;
    }

    .mode-icon {
      width: 46px;
      height: 46px;
      font-size: 23px;
    }

    .mode-arrow {
      display: none;
    }

    .mode-title {
      font-size: 21px;
    }

    .options {
      grid-template-columns: 1fr;
    }

    .feedback {
      grid-template-columns: 1fr;
    }

    .next-button {
      width: 100%;
    }
  }
</style>
</head>
<body>
<main class="shell">
  <section class="app" aria-label="三年级数学弱点专项小游戏">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">数</div>
        <div>
          <p class="eyebrow">三年级下册 · 弱点专项</p>
          <h1>数学侦探营</h1>
        </div>
      </div>
      <div class="stats" aria-label="本局成绩">
        <div class="stat"><span>得分</span><strong id="scoreText">0</strong></div>
        <div class="stat"><span>连对</span><strong id="streakText">0</strong></div>
        <div class="stat"><span>题目</span><strong id="roundText">0/12</strong></div>
      </div>
    </header>

    <section class="screen" id="startScreen">
      <div class="start-layout">
        <div class="hero">
          <svg viewBox="0 0 380 360" role="img" aria-label="数学训练台">
            <defs>
              <linearGradient id="boardGrad" x1="0" x2="1" y1="0" y2="1">
                <stop stop-color="#fffbe8"/>
                <stop offset="1" stop-color="#dff3e8"/>
              </linearGradient>
            </defs>
            <rect x="48" y="44" width="284" height="218" rx="20" fill="url(#boardGrad)" stroke="#24312c" stroke-width="6"/>
            <path d="M92 92h72v54H92zM164 146h54v54h-54zM218 92h70v108h-70z" fill="#dceffa" stroke="#347aa4" stroke-width="5"/>
            <circle cx="104" cy="244" r="18" fill="#dd6645" stroke="#24312c" stroke-width="5"/>
            <circle cx="274" cy="244" r="18" fill="#e7ad3f" stroke="#24312c" stroke-width="5"/>
            <path d="M104 244h170" stroke="#24312c" stroke-width="8" stroke-linecap="round"/>
            <circle cx="288" cy="88" r="46" fill="#fffdf3" stroke="#24312c" stroke-width="5"/>
            <path d="M288 88l0-28M288 88l24 14" stroke="#24312c" stroke-width="6" stroke-linecap="round"/>
            <text x="92" y="308" font-size="34" font-weight="900" fill="#2f8f68">找错因</text>
            <text x="220" y="308" font-size="34" font-weight="900" fill="#dd6645">再闯关</text>
          </svg>
          <h2>专练真正卡住的题</h2>
          <p>每局 12 题。先看图、找规律、判断关系，再算答案；错题会在结算页留下复习提示。</p>
        </div>
        <div class="mode-grid" id="modeGrid">
          <button class="mode-card" type="button" data-mode="mix">
            <span class="mode-icon">全</span>
            <span><span class="mode-title">混合挑战</span><span class="mode-detail">四类弱点随机出现，像期末卷一样切换思路</span></span>
            <span class="mode-arrow">›</span>
          </button>
          <button class="mode-card" type="button" data-mode="perimeter">
            <span class="mode-icon">周</span>
            <span><span class="mode-title">组合图形周长</span><span class="mode-detail">只数外面一圈，凹进去和共用边最容易错</span></span>
            <span class="mode-arrow">›</span>
          </button>
          <button class="mode-card" type="button" data-mode="direction">
            <span class="mode-icon">钟</span>
            <span><span class="mode-title">几点钟方向</span><span class="mode-detail">12 点在上，3 点在右，先定四个正方向</span></span>
            <span class="mode-arrow">›</span>
          </button>
          <button class="mode-card" type="button" data-mode="pattern">
            <span class="mode-icon">律</span>
            <span><span class="mode-title">数字找规律</span><span class="mode-detail">相邻差、倍数、奇偶位分开看</span></span>
            <span class="mode-arrow">›</span>
          </button>
          <button class="mode-card" type="button" data-mode="word">
            <span class="mode-icon">题</span>
            <span><span class="mode-title">应用题拆解</span><span class="mode-detail">先圈问题和单位，再判断加减乘除</span></span>
            <span class="mode-arrow">›</span>
          </button>
        </div>
      </div>
    </section>

    <section class="screen hidden" id="quizScreen">
      <div class="progress" aria-hidden="true"><i id="progressFill"></i></div>
      <div class="quiz-layout">
        <aside class="side">
          <div class="round-card">
            <span id="modeLabel">混合挑战</span>
            <strong id="roundBig">1</strong>
          </div>

const els = {

  modeGrid: document.querySelector("#modeGrid"),
  scoreText: document.querySelector("#scoreText"),

  progressFill: document.querySelector("#progressFill"),
  modeLabel: document.querySelector("#modeLabel"),
  roundBig: document.querySelector("#roundBig"),
  steps: document.querySelector("#steps"),
  soundButton: document.querySelector("#soundButton"),
  homeButton: document.querySelector("#homeButton"),
  hintBox: document.querySelector("#hintBox"),
  typeTag: document.querySelector("#typeTag"),
  levelTag: document.querySelector("#levelTag"),
  skillTag: document.querySelector("#skillTag"),
  promptText: document.querySelector("#promptText"),
  sceneBox: document.querySelector("#sceneBox"),
  optionsBox: document.querySelector("#optionsBox"),
  feedbackBox: document.querySelector("#feedbackBox"),
  feedbackText: document.querySelector("#feedbackText"),
  nextButton: document.querySelector("#nextButton"),
  finalScore: document.querySelector("#finalScore"),
  finalRate: document.querySelector("#finalRate"),
  resultTitle: document.querySelector("#resultTitle"),
  resultSummary: document.querySelector("#resultSummary"),
  weakList: document.querySelector("#weakList"),
  againButton: document.querySelector("#againButton"),
  resultHomeButton: document.querySelector("#resultHomeButton"),
};

let soundEnabled = loadSoundPreference();
let state = createState();
const soundPlayers = new Map();

function createState() {
  return {
    mode: MODES[0],
    round: 0,
    score: 0,
    streak: 0,
    bestStreak: 0,
    answered: [],
    wrong: [],
    current: null,
    locked: false,
  };
}

function shuffle(items) {
  const list = [...items];
  for (let index = list.length - 1; index > 0; index -= 1) {
    const swap = Math.floor(Math.random() * (index + 1));
    [list[index], list[swap]] = [list[swap], list[index]];
  }
  return list;
}

function randomItem(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function uniqueOptions(answer, distractors) {
  const answerText = String(answer);
  const rest = [...new Set(distractors.map(String))]
    .filter((item) => item !== answerText)
    .slice(0, 3);
  return shuffle([answerText, ...rest]);
}

function startGame(modeId = "mix") {
  playSound("click");
  const mode = MODES.find((item) => item.id === modeId) || MODES[0];
  state = createState();
  state.mode = mode;
  els.startScreen.classList.add("hidden");
  els.resultScreen.classList.add("hidden");
  els.quizScreen.classList.remove("hidden");
  nextQuestion();
}

function nextQuestion() {
  if (state.round >= ROUND_TOTAL) {
    finishGame();
    return;
  }

  const type = randomItem(state.mode.types);
  state.current = makeQuestion(type, state.round);
  state.round += 1;
  state.locked = false;
  renderQuestion();
}

function makeQuestion(type, roundIndex) {
  if (type === "perimeter") {
    return makePerimeterQuestion(roundIndex);
  }
  if (type === "direction") {
    return makeDirectionQuestion(roundIndex);
  }
  if (type === "pattern") {
    return makePatternQuestion(roundIndex);
  }
  return makeWordQuestion(roundIndex);
}

function makePerimeterQuestion(roundIndex) {
  const left = randomItem([6, 7, 8, 9, 10, 12]);
  const bottom = randomItem([8, 9, 10, 11, 12, 14]);
  const notchWidth = randomItem([2, 3, 4, 5]);
  const notchHeight = randomItem([2, 3, 4]);
  const answer = 2 * (left + bottom);
  const options = uniqueOptions(`${answer} 厘米`, [
    `${answer + notchWidth + notchHeight} 厘米`,
    `${answer - notchWidth - notchHeight} 厘米`,
    `${left + bottom + notchWidth + notchHeight} 厘米`,
    `${2 * left + bottom + notchWidth} 厘米`,
  ]);

  return {
    type: "组合图形周长",
    level: roundIndex > 5 ? "提高" : "基础",
    skill: "缺角 L 形",
    prompt: "下面是一块 L 形的地，求它的周长。",
    scene: renderLShape({ left, bottom, notchWidth, notchHeight }),
    answer: `${answer} 厘米`,
    options,
    explain: `这种缺角 L 形可以看成一个长方形缺了一角。缺口宽会补到底边少掉的那段，缺口高会补到右边少掉的那段，所以周长 = 2 ×（底边 ${bottom} + 左边 ${left}）= ${answer} 厘米。`,
  };
}

function renderLShape({ left, bottom, notchWidth, notchHeight }) {
  const x0 = 82;
  const y0 = 46;
  const width = 236;
  const height = 176;
  const notchW = Math.round((notchWidth / bottom) * width);
  const notchH = Math.round((notchHeight / left) * height);
  const x1 = x0 + width - notchW;
  const y1 = y0 + notchH;
  const x2 = x0 + width;
  const y2 = y0 + height;
  const path = `M${x0} ${y0} H${x1} V${y1} H${x2} V${y2} H${x0} Z`;

  return `
    <svg viewBox="0 0 420 288" role="img" aria-label="缺角 L 形地">
      <rect x="8" y="8" width="404" height="272" rx="14" fill="#fffdf3" stroke="rgba(36,49,44,.18)" stroke-width="2"/>
      <path d="${path}" fill="#e8f0fb" stroke="#347aa4" stroke-width="6" stroke-linejoin="miter"/>
      <line x1="${x0}" y1="${y0}" x2="${x0}" y2="${y2}" stroke="#24312c" stroke-width="2" stroke-dasharray="5 6" opacity=".22"/>
      <line x1="${x0}" y1="${y2}" x2="${x2}" y2="${y2}" stroke="#24312c" stroke-width="2" stroke-dasharray="5 6" opacity=".22"/>
      <text x="${x0 - 36}" y="${(y0 + y2) / 2}" text-anchor="middle" font-size="24" font-weight="900" fill="#24312c" transform="rotate(-90 ${x0 - 36} ${(y0 + y2) / 2})">左边 ${left}</text>
      <text x="${(x0 + x2) / 2}" y="${y2 + 38}" text-anchor="middle" font-size="24" font-weight="900" fill="#24312c">底边 ${bottom}</text>
      <text x="${(x1 + x2) / 2 + 8}" y="${y1 - 16}" text-anchor="middle" font-size="20" font-weight="900" fill="#65736d">缺口宽 ${notchWidth}</text>
      <text x="${x2 + 8}" y="${(y1 + y2) / 2 - 6}" font-size="20" font-weight="900" fill="#65736d">缺口高 ${notchHeight}</text>
      <text x="210" y="24" text-anchor="middle" font-size="18" font-weight="900" fill="#65736d">周长是 ____ 厘米</text>
    </svg>
  `;
}

function makeDirectionQuestion(roundIndex) {
  const easyHours = [12, 3, 6, 9];
  const hardHours = [1, 2, 4, 5, 7, 8, 10, 11];
  const hour = roundIndex < 2 ? randomItem(easyHours) : randomItem(hardHours);
  const options = makeHourOptions(hour);

  return {
    type: "几点钟方向",
    level: easyHours.includes(hour) ? "基础" : "提高",
    skill: "钟向 + 方位",
    prompt: "小旗在小朋友的哪个方向？请选择“几点钟方向 + 方位词”。",
    scene: renderClockScene(hour),
    answer: HOUR_LABELS[hour],
    options,
    explain: `把小朋友想成钟面中心：上方是 12 点钟方向，也叫北方；右方是 3 点钟方向，也叫东方。小旗落在 ${HOUR_LABELS[hour]}。`,
  };
}

function makeHourOptions(hour) {
  const near = [hour, wrapHour(hour + 1), wrapHour(hour - 1), wrapHour(hour + 3), wrapHour(hour + 6)];
  const labels = [...new Set(near.map((value) => HOUR_LABELS[value]))];
  return uniqueOptions(HOUR_LABELS[hour], labels.filter((item) => item !== HOUR_LABELS[hour]));
}

function wrapHour(hour) {
  let value = hour;
  while (value > 12) value -= 12;
  while (value < 1) value += 12;
  return value;
}

function renderClockScene(hour) {
  const cx = 190;
  const cy = 162;
  const r = 118;
  const angle = (hour % 12) * 30 - 90;
  const rad = (angle * Math.PI) / 180;
  const tx = cx + Math.cos(rad) * r;
  const ty = cy + Math.sin(rad) * r;
  const marks = Array.from({ length: 12 }, (_, index) => {
    const a = index * 30 - 90;
    const rr = (a * Math.PI) / 180;
    const xA = cx + Math.cos(rr) * 116;
    const yA = cy + Math.sin(rr) * 116;
    const xB = cx + Math.cos(rr) * 128;
    const yB = cy + Math.sin(rr) * 128;
    return `<line x1="${xA}" y1="${yA}" x2="${xB}" y2="${yB}"/>`;
  }).join("");

  return `
    <svg viewBox="0 0 380 338" role="img" aria-label="钟面方向图">
      <circle cx="${cx}" cy="${cy}" r="128" fill="#fffdf3" stroke="#24312c" stroke-width="4"/>
      <g stroke="#65736d" stroke-width="4" stroke-linecap="round">${marks}</g>
      <circle cx="${cx}" cy="${cy}" r="26" fill="#dff3e8" stroke="#24312c" stroke-width="4"/>
      <text x="${cx}" y="${cy + 7}" text-anchor="middle" font-size="18" font-weight="900" fill="#24312c">我</text>
      <line x1="${cx}" y1="${cy}" x2="${tx}" y2="${ty}" stroke="#dd6645" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 9"/>
      <path d="M${tx - 10} ${ty + 22}v-48l46 14-46 14" fill="#e7ad3f" stroke="#24312c" stroke-width="4" stroke-linejoin="round"/>
      <text x="${cx}" y="322" text-anchor="middle" font-size="17" font-weight="900" fill="#65736d">圆盘不标数字：先想上北、右东、下南、左西</text>
    </svg>
  `;
}

function makePatternQuestion(roundIndex) {
  const item = PATTERN_BANK[roundIndex % PATTERN_BANK.length];
  const answer = item.answer;
  const options = uniqueOptions(answer, [
    answer + randomItem([1, 2, 3, 4, 5, 6]),
    Math.max(answer - randomItem([1, 2, 3, 4, 5, 6]), 0),
    answer * 2,
    Math.max(Math.floor(answer / 2), 1),
  ]);

  return {
    type: "数字找规律",
    level: roundIndex % 3 === 0 ? "提高" : "基础",
    skill: "先找变化",
    prompt: "横线里应该填哪个数？",
    scene: renderPatternScene(item.seq),
    answer: String(answer),
    options,
    explain: item.rule,
  };
}

function renderPatternScene(seq) {
  const chips = seq.map((value) => `<span style="
    display:inline-grid;place-items:center;min-width:58px;height:58px;
    border:3px solid #24312c;border-radius:8px;background:${value === null ? "#f8d9cc" : "#fffdf6"};
    box-shadow:3px 3px 0 rgba(36,49,44,.12);font-size:26px;font-weight:900;">
    ${value === null ? "?" : value}
  </span>`).join("");

  return `<div class="word-scene" style="text-align:center;">${chips}</div>`;
}

function makeWordQuestion(roundIndex) {
  const item = WORD_BANK[roundIndex % WORD_BANK.length];
  return {
    type: "应用题拆解",
    level: roundIndex % 2 === 0 ? "基础" : "提高",
    skill: "先圈问题",
    prompt: "先读题，再选正确答案。",
    scene: renderWordScene(item.prompt),
    answer: item.answer,
    options: shuffle(item.options),
    explain: item.explain,
  };
}

function renderWordScene(prompt) {
  const highlighted = prompt.replace(/(\d+)/g, "<em>$1</em>");
  return `<div class="word-scene">${highlighted}</div>`;
}

function renderQuestion() {
  const q = state.current;
  els.feedbackBox.classList.add("hidden");
  els.modeLabel.textContent = state.mode.label;
  els.roundBig.textContent = state.round;
  els.scoreText.textContent = state.score;
  els.streakText.textContent = state.streak;
  els.roundText.textContent = `${state.round}/${ROUND_TOTAL}`;
  els.progressFill.style.width = `${((state.round - 1) / ROUND_TOTAL) * 100}%`;
  els.hintBox.textContent = HINTS[activeTypeKey(q.type)] || "先想清楚关系，再选择答案。";
  els.typeTag.textContent = q.type;
  els.levelTag.textContent = q.level;
  els.skillTag.textContent = q.skill;
  els.promptText.innerHTML = `${q.prompt}<small>${q.skill}</small>`;
  els.sceneBox.innerHTML = q.scene;
  els.optionsBox.innerHTML = q.options.map((option) => `
    <button class="option" type="button" data-value="${escapeAttr(option)}">${option}</button>
  `).join("");
  renderSteps();
}

function activeTypeKey(type) {
  if (type.includes("周长")) return "perimeter";
  if (type.includes("方向")) return "direction";
  if (type.includes("规律")) return "pattern";
  return "word";
}

function renderSteps() {
  const steps = [];
  for (let i = 0; i < ROUND_TOTAL; i += 1) {
    const record = state.answered[i];
    const className = record ? (record.correct ? "step good" : "step bad") : "step";
    steps.push(`<span class="${className}"></span>`);
  }
  els.steps.innerHTML = steps.join("");
}

function chooseAnswer(value, button) {
  if (state.locked) return;

  playSound("click");
  state.locked = true;
  const q = state.current;
  const correct = String(value) === String(q.answer);
  const buttons = [...els.optionsBox.querySelectorAll(".option")];

  buttons.forEach((item) => {
    item.disabled = true;
    if (item.dataset.value === String(q.answer)) {
      item.classList.add("correct");
    } else if (item === button) {
      item.classList.add("wrong");
    } else {
      item.classList.add("dim");
    }
  });

  if (correct) {
    state.score += 1;
    state.streak += 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    window.setTimeout(() => playSound("correct"), 80);
    popBurst();
  } else {
    state.streak = 0;
    state.wrong.push({ ...q, choice: value });
    window.setTimeout(() => playSound("wrong"), 80);
  }

  state.answered.push({ correct, type: q.type });
  els.scoreText.textContent = state.score;
  els.streakText.textContent = state.streak;
  els.progressFill.style.width = `${(state.round / ROUND_TOTAL) * 100}%`;
  renderSteps();
  showFeedback(correct, q, value);
}

function showFeedback(correct, q, value) {
  const title = correct ? "答对了" : "这题抓到弱点了";
  const detail = correct
    ? q.explain
    : `你选了“${value}”。正确答案是“${q.answer}”。${q.explain}`;
  els.feedbackText.innerHTML = `<strong>${title}</strong><br>${detail}`;
  els.feedbackBox.classList.remove("hidden");
}

function finishGame() {
  saveWeakTypes(state.wrong.map((item) => item.type));
  saveBest(Math.max(loadBest(), state.score));
  const rate = Math.round((state.score / ROUND_TOTAL) * 100);
  els.quizScreen.classList.add("hidden");
  els.resultScreen.classList.remove("hidden");
  els.finalScore.textContent = `${state.score}/${ROUND_TOTAL}`;
  els.finalRate.textContent = `正确率 ${rate}%`;
  els.resultTitle.textContent = rate >= 90 ? "侦探很稳" : rate >= 70 ? "弱点变少了" : "继续专项突破";
  els.resultSummary.textContent = `本局最长连对 ${state.bestStreak} 题。建议下一局优先练错题最多的专项。`;
  els.weakList.innerHTML = state.wrong.length
    ? state.wrong.map((item) => `
      <div class="weak-item">
        <strong>${item.type}</strong><br>
        ${stripHtml(item.prompt)}<br>
        你选：${item.choice}；正确：${item.answer}<br>
        ${item.explain}
      </div>
    `).join("")
    : `<div class="weak-item"><strong>本局没有错题。</strong><br>可以切到混合挑战，看看换题型时是否还稳。</div>`;
  playSound("finale");
}

function goHome() {
  playSound("click");
  els.quizScreen.classList.add("hidden");
  els.resultScreen.classList.add("hidden");
  els.startScreen.classList.remove("hidden");
  state = createState();
  els.scoreText.textContent = "0";
  els.streakText.textContent = "0";
  els.roundText.textContent = `0/${ROUND_TOTAL}`;
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  saveSoundPreference();
  updateSoundButton();
  if (soundEnabled) playSound("click");
}

function updateSoundButton() {
  els.soundButton.textContent = soundEnabled ? "音效：开" : "音效：关";
  els.soundButton.setAttribute("aria-pressed", String(soundEnabled));
}

function playSound(name) {
  if (!soundEnabled || typeof Audio === "undefined") return;
  const src = SOUND_ASSETS[name];
  if (!src) return;
  let player = soundPlayers.get(name);
  if (!player) {
    player = new Audio(src);
    player.preload = "auto";
    player.volume = name === "finale" ? 0.72 : 0.9;
    soundPlayers.set(name, player);
  }
  try {
    player.currentTime = 0;
    const playback = player.play();
    if (playback && typeof playback.catch === "function") playback.catch(() => {});
  } catch {
    // Some browsers block sound until the first tap.
  }
}

function popBurst() {
  const colors = ["#2f8f68", "#347aa4", "#e7ad3f", "#dd6645", "#7160a8"];
  for (let i = 0; i < 18; i += 1) {
    const bit = document.createElement("span");
    const angle = (Math.PI * 2 * i) / 18;
    const distance = 58 + Math.random() * 48;
    bit.className = "burst";
    bit.style.setProperty("--x", `${50 + (Math.random() - 0.5) * 10}vw`);
    bit.style.setProperty("--y", `${46 + (Math.random() - 0.5) * 10}vh`);
    bit.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
    bit.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
    bit.style.setProperty("--color", colors[i % colors.length]);
    document.body.appendChild(bit);
    window.setTimeout(() => bit.remove(), 780);
  }
}

function stripHtml(value) {
  return String(value).replace(/<[^>]*>/g, "");
}

function escapeAttr(value) {
  return String(value).replace(/"/g, "&quot;");
}

function loadStore() {
  try {
    return JSON.parse(window.localStorage.getItem(STORE_KEY) || "{}");
  } catch {
    return {};
  }
}

function saveStore(next) {
  try {
    window.localStorage.setItem(STORE_KEY, JSON.stringify(next));
  } catch {
    // The game still works if local storage is unavailable.
  }
}

function loadSoundPreference() {
  const store = loadStore();
  return store.soundEnabled === undefined ? true : store.soundEnabled === true;
}

function saveSoundPreference() {
  saveStore({ ...loadStore(), soundEnabled });
}

function loadBest() {
  const store = loadStore();
  return Number.isFinite(store.best) ? store.best : 0;
}

function saveBest(best) {
  saveStore({ ...loadStore(), best });
}

function saveWeakTypes(types) {
  saveStore({ ...loadStore(), weakTypes: types });
}

updateSoundButton();

els.modeGrid.addEventListener("click", (event) => {
  const button = event.target.closest("[data-mode]");
  if (!button) return;
  startGame(button.dataset.mode);
});

els.optionsBox.addEventListener("click", (event) => {
  const button = event.target.closest(".option");
  if (!button) return;
  chooseAnswer(button.dataset.value, button);
});

els.nextButton.addEventListener("click", () => {
  playSound("click");
  nextQuestion();
});

els.soundButton.addEventListener("click", toggleSound);
els.homeButton.addEventListener("click", goHome);
els.againButton.addEventListener("click", () => startGame(state.mode.id));
els.resultHomeButton.addEventListener("click", goHome);
</script>
</body>
</html>
