<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英语闯关小游戏 · Unit 1-6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF7E6; --card:#FFFFFF; --ink:#2C2723; --soft:#7A7060;
    --coral:#E0592E; --coral-bg:#FBE5DA;
    --teal:#2A8C86;  --teal-bg:#D9EDEB;
    --sun:#F4B739; --green:#4CAF6D; --red:#E0592E;
    --line:#EADFC6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:radial-gradient(120% 120% at 50% 0%,#FFF7E6 0%,#FDEBC9 100%);
    color:var(--ink);font-family:"Nunito","PingFang SC","Microsoft YaHei",sans-serif;
    min-height:100%;display:flex;flex-direction:column;
    -webkit-print-color-adjust:exact;overflow-x:hidden;
  }
  .wrap{flex:1;width:100%;max-width:760px;margin:0 auto;padding:18px 20px 28px;display:flex;flex-direction:column;}
  .fred{font-family:"Fredoka",sans-serif;}

  /* ---------- top bar ---------- */
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;min-height:48px;}
  .iconbtn{
    width:48px;height:48px;border-radius:14px;border:2.5px solid var(--ink);background:#fff;
    font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 3px 0 var(--ink);transition:transform .05s;
  }
  .iconbtn:active{transform:translateY(3px);box-shadow:none;}
  .stars{
    margin-left:auto;background:#fff;border:2.5px solid var(--ink);border-radius:16px;
    padding:6px 16px;font-family:"Fredoka",sans-serif;font-weight:700;font-size:20px;
    box-shadow:0 3px 0 var(--ink);display:flex;align-items:center;gap:6px;
  }
  .progress{height:14px;background:#fff;border:2.5px solid var(--ink);border-radius:10px;overflow:hidden;margin-bottom:6px;}
  .progress > i{display:block;height:100%;width:0;background:var(--sun);transition:width .4s ease;}
  .qcount{font-size:13px;color:var(--soft);font-weight:700;text-align:right;margin-bottom:14px;}

  /* ---------- screens ---------- */
  .screen{flex:1;display:flex;flex-direction:column;}
  .hide{display:none!important;}

  /* start */
  .hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;}
  .mascot{font-size:84px;line-height:1;animation:bob 2.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-12px) rotate(3deg);}}
  h1{font-family:"Fredoka",sans-serif;font-weight:700;font-size:34px;margin:6px 0 0;}
  .lead{color:var(--soft);font-weight:700;font-size:15px;margin-bottom:18px;}
  .pick-label{font-weight:800;font-size:15px;color:var(--ink);margin:6px 0 12px;}
  .picks{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px;}
  .unit-grid{display:grid;grid-template-columns:1fr 1fr;max-width:620px;}
  .unit-grid .both{grid-column:1/-1;}
  .bigbtn{
    border:3px solid var(--ink);border-radius:20px;padding:18px 20px;background:#fff;cursor:pointer;
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:22px;box-shadow:0 5px 0 var(--ink);
    transition:transform .06s;display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .bigbtn:active{transform:translateY(5px);box-shadow:none;}
  .bigbtn.u1{background:var(--coral-bg);}
  .bigbtn.u2{background:var(--teal-bg);}
  .bigbtn.both{background:var(--sun);}
  .bigbtn small{font-family:"Nunito",sans-serif;font-weight:700;font-size:13px;color:var(--soft);}

  /* question */
  .qcard{
    flex:1;background:#fff;border:3px solid var(--ink);border-radius:24px;
    box-shadow:0 6px 0 var(--ink);padding:22px 22px 24px;display:flex;flex-direction:column;
  }
  .qtype{font-weight:800;font-size:13px;letter-spacing:.06em;color:var(--coral);text-transform:uppercase;}
  .qprompt{font-family:"Fredoka",sans-serif;font-weight:600;font-size:22px;margin:6px 0 0;line-height:1.25;}
  .qbig{
    flex:0 0 auto;text-align:center;margin:14px 0 6px;
  }
  .qbig .emoji{font-size:78px;line-height:1;}
  .qbig .pic{
    width:min(220px,58vw);height:min(220px,58vw);object-fit:cover;border-radius:24px;
    border:3px solid var(--ink);box-shadow:0 5px 0 var(--ink);background:#FFF7E6;
  }
  .qbig .word{font-family:"Fredoka",sans-serif;font-weight:700;font-size:54px;letter-spacing:1px;}
  .qbig .word .hl{color:var(--coral);}
  .qbig .speaker{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
    background:var(--teal-bg);border:3px solid var(--ink);border-radius:18px;padding:14px 26px;
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:20px;box-shadow:0 4px 0 var(--ink);
  }
  .qbig .speaker:active{transform:translateY(4px);box-shadow:none;}
  .qbig .zh{font-family:"Nunito","PingFang SC",sans-serif;font-weight:800;font-size:40px;}

  .opts{margin-top:auto;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .opt{
    border:3px solid var(--ink);border-radius:18px;background:#fff;cursor:pointer;
    padding:16px 12px;min-height:66px;font-family:"Fredoka",sans-serif;font-weight:600;font-size:22px;
    box-shadow:0 4px 0 var(--ink);transition:transform .06s;display:flex;align-items:center;justify-content:center;
    text-align:center;line-height:1.15;
  }
  .opt .zh{font-family:"Nunito","PingFang SC",sans-serif;font-weight:800;}
  .opt .hint{display:block;font-family:"Nunito",sans-serif;font-weight:700;font-size:12px;color:var(--soft);margin-top:3px;}
  .opt:active{transform:translateY(4px);box-shadow:none;}
  .opt.correct{background:var(--green);color:#fff;border-color:#2e7d4f;}
  .opt.wrong{background:var(--red);color:#fff;border-color:#a83a1c;}
  .opt.dim{opacity:.45;}
  .opt:disabled{cursor:default;}

  .feedback{
    margin-top:14px;min-height:0;display:flex;align-items:center;gap:12px;
    background:var(--card);border-radius:16px;padding:0 4px;overflow:hidden;
    max-height:0;transition:max-height .25s ease,margin .25s ease;
  }
  .feedback.show{max-height:120px;margin-top:14px;}
  .fb-emoji{font-size:34px;}
  .fb-text{font-weight:800;font-size:16px;}
  .fb-text small{display:block;font-weight:700;color:var(--soft);font-size:13px;margin-top:2px;}
  .nextbtn{
    margin-left:auto;border:3px solid var(--ink);border-radius:16px;background:var(--sun);cursor:pointer;
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:18px;padding:12px 22px;box-shadow:0 4px 0 var(--ink);
    white-space:nowrap;
  }
  .nextbtn:active{transform:translateY(4px);box-shadow:none;}

  /* end */
  .endcard{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;}
  .endmascot{font-size:90px;line-height:1;animation:pop .5s ease;}
  @keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.15);}100%{transform:scale(1);}}
  .score{font-family:"Fredoka",sans-serif;font-weight:700;font-size:48px;}
  .score b{color:var(--coral);}
  .endmsg{font-weight:800;font-size:20px;margin:4px 0 4px;}
  .endsub{color:var(--soft);font-weight:700;font-size:14px;margin-bottom:18px;}

  /* settings overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(44,39,35,.45);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .panel{
    background:#fff;border:3px solid var(--ink);border-radius:22px;box-shadow:0 8px 0 var(--ink);
    width:100%;max-width:420px;padding:22px;
  }
  .panel h2{font-family:"Fredoka",sans-serif;font-weight:600;font-size:22px;margin:0 0 4px;}
  .panel p.sub{color:var(--soft);font-weight:700;font-size:13px;margin:0 0 16px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-weight:800;font-size:14px;margin-bottom:7px;}
  .field select{
    width:100%;border:2.5px solid var(--ink);border-radius:14px;padding:12px 14px;
    font-family:"Nunito",sans-serif;font-weight:700;font-size:16px;background:#fff;color:var(--ink);
    -webkit-appearance:none;appearance:none;
  }
  .field input[type=range]{width:100%;height:30px;accent-color:var(--coral);}
  .rate-row{display:flex;align-items:center;gap:10px;}
  .rate-row .val{font-family:"Fredoka",sans-serif;font-weight:700;min-width:64px;text-align:right;}
  .panel .row2{display:flex;gap:12px;margin-top:6px;}
  .panel .pbtn{
    flex:1;border:3px solid var(--ink);border-radius:16px;padding:13px;cursor:pointer;
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:17px;box-shadow:0 4px 0 var(--ink);
  }
  .panel .pbtn:active{transform:translateY(4px);box-shadow:none;}
  .pbtn.test{background:var(--teal-bg);}
  .pbtn.done{background:var(--sun);}
  .panel .nohint{font-size:12px;color:var(--soft);font-weight:700;margin-top:14px;line-height:1.5;}
  .setlink{
    margin-top:16px;background:none;border:none;color:var(--soft);font-weight:800;font-size:14px;
    cursor:pointer;text-decoration:underline;
  }

  /* difficulty selector */
  .diffwrap{margin:2px 0 16px;width:100%;max-width:360px;}
  .difflabel{font-weight:800;font-size:14px;color:var(--ink);margin-bottom:8px;}
  .diffrow{display:flex;gap:8px;}
  .diff{
    flex:1;border:2.5px solid var(--ink);border-radius:14px;background:#fff;cursor:pointer;
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:16px;padding:11px 4px;box-shadow:0 3px 0 var(--ink);
  }
  .diff small{display:block;font-family:"Nunito",sans-serif;font-weight:700;font-size:11px;color:var(--soft);margin-top:2px;}
  .diff:active{transform:translateY(3px);box-shadow:none;}
  .diff.on{background:var(--sun);}
  .diff.on small{color:#5a4a14;}

  /* spell tiles + sentence chips */
  .slots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0 6px;}
  .slot{
    min-width:42px;height:54px;border:3px dashed var(--line);border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-family:"Fredoka",sans-serif;font-weight:700;font-size:30px;background:#FFFDF6;padding:0 8px;
  }
  .slot.filled{border-style:solid;border-color:var(--ink);background:#fff;}
  .tiles{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:6px;}
  .tile{
    min-width:50px;height:56px;border:3px solid var(--ink);border-radius:14px;background:#fff;cursor:pointer;
    font-family:"Fredoka",sans-serif;font-weight:700;font-size:28px;box-shadow:0 4px 0 var(--ink);padding:0 10px;
  }
  .tile:active{transform:translateY(4px);box-shadow:none;}
  .tile.used{opacity:.28;pointer-events:none;}
  .wtile{font-size:20px;height:52px;padding:0 16px;}
  .ansrow{
    min-height:54px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;
    margin:12px 0 6px;padding:8px;border:3px dashed var(--line);border-radius:14px;background:#FFFDF6;
  }
  .ansrow:empty::before{content:"点下面的词，按顺序排好";color:var(--soft);font-weight:700;font-size:14px;}
  .ansrow .placed{
    background:var(--teal-bg);border:2.5px solid var(--ink);border-radius:12px;padding:8px 14px;
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:19px;cursor:pointer;
  }
  .spellbar{display:flex;gap:10px;justify-content:center;margin-top:10px;}
  .minibtn{
    border:2.5px solid var(--ink);border-radius:12px;background:#fff;cursor:pointer;
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:16px;padding:10px 18px;box-shadow:0 3px 0 var(--ink);
  }
  .minibtn:active{transform:translateY(3px);box-shadow:none;}
  .minibtn.check{background:var(--green);color:#fff;border-color:#2e7d4f;}
  .hintzh{text-align:center;font-family:"Nunito","PingFang SC",sans-serif;font-weight:800;font-size:20px;margin-top:4px;}

  /* confetti */
  .confetti{position:fixed;top:-20px;width:12px;height:18px;border-radius:3px;z-index:50;pointer-events:none;}
  @media (prefers-reduced-motion: reduce){
    .mascot,.endmascot{animation:none;}
    .confetti{display:none;}
  }
  @media (max-width:480px){
    .qbig .word{font-size:44px;} .qbig .zh{font-size:32px;}
    .opt{font-size:19px;} h1{font-size:28px;}
    .unit-grid{display:flex;max-width:360px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="bar" id="bar" style="visibility:hidden">
    <button class="iconbtn" id="homeBtn" title="回首页">🏠</button>
    <button class="iconbtn" id="muteBtn" title="声音开关">🔊</button>
    <button class="iconbtn" id="setBtn" title="发音设置">⚙️</button>
    <div class="stars">⭐ <span id="starCount">0</span></div>
  </div>
  <div class="progress" id="progWrap" style="visibility:hidden"><i id="progBar"></i></div>
  <div class="qcount" id="qcount" style="visibility:hidden"></div>

  <!-- START -->
  <div class="screen" id="startScreen">
    <div class="hero">
      <div class="mascot">🦊</div>
      <h1>英语闯关乐园</h1>
      <div class="lead">Unit 1-6 · 点一点就能玩</div>
      <div class="pick-label">选一关开始吧！</div>
      <div class="diffwrap">
        <div class="difflabel">难度</div>
        <div class="diffrow" id="diffRow">
          <button class="diff" data-diff="easy">简单<small>看图选词</small></button>
          <button class="diff on" data-diff="med">进阶<small>拼单词</small></button>
          <button class="diff" data-diff="hard">挑战<small>听音+造句</small></button>
        </div>
      </div>
      <div class="picks unit-grid">
        <button class="bigbtn u1" data-units="1">Unit 1 <small>Meeting new people</small></button>
        <button class="bigbtn u2" data-units="2">Unit 2 <small>Expressing yourself</small></button>
        <button class="bigbtn" data-units="3">Unit 3 <small>Learning better</small></button>
        <button class="bigbtn" data-units="4">Unit 4 <small>Healthy food</small></button>
        <button class="bigbtn" data-units="5">Unit 5 <small>Old toys</small></button>
        <button class="bigbtn" data-units="6">Unit 6 <small>Numbers in life</small></button>
        <button class="bigbtn both" data-units="123456">🌟 全部混合挑战</button>
      </div>
      <button class="setlink" id="setBtnStart">⚙️ 发音设置（声音不清晰点这里）</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen hide" id="quizScreen">
    <div class="qcard">
      <div class="qtype" id="qtype"></div>
      <div class="qprompt" id="qprompt"></div>
      <div class="qbig" id="qbig"></div>
      <div class="opts" id="opts"></div>
      <div class="feedback" id="feedback">
        <div class="fb-emoji" id="fbEmoji"></div>
        <div class="fb-text" id="fbText"></div>
        <button class="nextbtn" id="nextBtn">下一题 ▶</button>
      </div>
    </div>
  </div>

  <!-- END -->
  <div class="screen hide" id="endScreen">
    <div class="endcard">
      <div class="endmascot" id="endMascot">🏆</div>
      <div class="score"><b id="endScore">0</b> / <span id="endTotal">10</span> ⭐</div>
      <div class="endmsg" id="endMsg"></div>
      <div class="endsub" id="endSub"></div>
      <div class="picks">
        <button class="bigbtn both" id="againBtn">🔁 再玩一次</button>
        <button class="bigbtn" id="homeBtn2">🏠 回首页选关</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS OVERLAY -->
  <div class="overlay hide" id="overlay">
    <div class="panel">
      <h2>⚙️ 发音设置</h2>
      <p class="sub">选一个更清楚的声音，还可以调慢语速</p>
      <div class="field">
        <label>选择声音</label>
        <select id="voiceSel"></select>
      </div>
      <div class="field">
        <label>语速</label>
        <div class="rate-row">
          <input type="range" id="rateSel" min="0.5" max="1" step="0.05" value="0.8">
          <span class="val" id="rateVal">正常</span>
        </div>
      </div>
      <div class="row2">
        <button class="pbtn test" id="testBtn">🔊 试听 “cake”</button>
        <button class="pbtn done" id="doneBtn">完成</button>
      </div>
      <div class="nohint" id="voiceHint"></div>
    </div>
  </div>

</div>

/* ============ 数据 ============ */
const ITEMS = [

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(arr,n){return shuffle(arr).slice(0,n);}
function hasPicture(it){return !!(it&&(it.img||(it.emoji&&PICTURE_WORDS.has(it.en))));}
function pictureBig(it){return it.img?{kind:'image',src:it.img,alt:''}:{kind:'emoji',text:it.emoji};}
function pickDistractors(pool,exclude,n,key){
  const out=[];const seen=new Set(exclude);
  for(const x of shuffle(pool)){const v=key?x[key]:x;if(seen.has(v))continue;seen.add(v);out.push(x);if(out.length>=n)break;}
  return out;
}

let muted=false, ac=null, voices=[], enVoices=[], chosenVoice=null, rate=0.8;
// 偏好更清晰的声音：优先 enhanced/premium/Siri/Google，避开 compact/eloquence
function scoreVoice(v){
  const n=(v.name||'').toLowerCase();
  let s=0;
  if(/premium/.test(n))s+=6;
  if(/enhanced/.test(n))s+=5;
  if(/siri/.test(n))s+=4;
  if(/google/.test(n))s+=4;
  if(/natural|neural/.test(n))s+=4;
  if(/^en[-_]?gb/i.test(v.lang))s+=2;     // 英音优先（更贴近课本）
  else if(/^en/i.test(v.lang))s+=1;
  if(/compact|eloquence|fred|albert|zarvox|whisper/.test(n))s-=5; // 机械音降权
  return s;
}
function loadVoices(){
  if(!('speechSynthesis' in window))return;
  voices=speechSynthesis.getVoices();
  enVoices=voices.filter(v=>/^en/i.test(v.lang)).sort((a,b)=>scoreVoice(b)-scoreVoice(a));
  if(!chosenVoice && enVoices.length) chosenVoice=enVoices[0];
  buildVoiceList();
}
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function speak(text){
  if(muted||!('speechSynthesis' in window)||!text)return;
  try{
    const u=new SpeechSynthesisUtterance(text);
    u.rate=rate;u.pitch=1.06;
    if(chosenVoice){u.voice=chosenVoice;u.lang=chosenVoice.lang;}else{u.lang='en-GB';}
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }catch(e){}
}
function beep(kind){
  if(muted)return;
  try{
    if(!ac)ac=new (window.AudioContext||window.webkitAudioContext)();
    const now=ac.currentTime;
    const notes = kind==='good' ? [523,659,784] : [330,247];
    notes.forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type=kind==='good'?'triangle':'sine';o.frequency.value=f;
      const t=now+i*(kind==='good'?0.09:0.12);
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.22,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
      o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.22);
    });
  }catch(e){}
}

function makePhonics(p){
  const enItem=EN2ITEM[p.word];
  const idx=p.word.indexOf(p.vowel);

  const opts = PHONIC_CHOICES[p.vowel] || PHONIC_CHOICES.a;

    learn:{emoji:'🔤',text:p.word+' 里 '+p.vowel+' 是 '+soundText+(enItem?'（'+enItem.zh+'）':''),speak:p.word}
  };
}
function makePair(p,items){
  let a=p.a,b=p.b; if(Math.random()<0.5){a=p.b;b=p.a;}
  const bItem=EN2ITEM[b];
  const dist=pickDistractors(items.filter(i=>i.en!==a&&i.en!==b),[],gOptN-1,'en');
  const opts=shuffle([{en:b,correct:true},...dist.map(d=>({en:d.en,correct:false}))]);
  return {
    type:'好朋友配对', prompt:'和 “'+a+'” 是一对的词是哪个？',
    big:{kind:'speaker',text:a}, speakText:a,
    options:opts.map(o=>({html:o.en,correct:o.correct,speak:o.en})),
    learn:{emoji:'🤝',text:a+' ↔ '+b+'（'+(EN2ITEM[a]?EN2ITEM[a].zh:'')+' ↔ '+(bItem?bItem.zh:'')+'）',speak:b}

function makeSpell(it,hard){
  const word=it.en;

  let letters=word.split('');
  if(hard){ // 加 2 个干扰字母
    const pool='abcdefghijklmnoprstuvwy'.split('');
    for(let k=0;k<2;k++)letters.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  return {
    mode:'spell', type: hard?'听音拼词':'拼一拼',
    prompt: (hard||!visual)?'听一听，再把单词拼出来':'看图，把单词拼出来',
    big: (hard||!visual) ? {kind:'listen',text:word} : pictureBig(it),
    hintZh: (hard||!visual)?null:it.zh, autoSpeak:true,
    word:word, tiles:shuffle(letters),
    speakText:word,
    learn:{emoji:'🔤',text:word+' = '+it.zh,speak:word}
  };
}

}
function buildRound(units){
  const items=ITEMS.filter(i=>units.includes(i.unit));

  const sents=SENTENCES.filter(s=>units.includes(s.unit));
  const forced=[];

  if(gDiff==='easy'){
    sample(phon,3).forEach(p=>forced.push(makePhonics(p)));
    sample(pairs,2).forEach(p=>forced.push(makePair(p,items)));
  } else if(gDiff==='med'){
    sample(phon,2).forEach(p=>forced.push(makePhonics(p)));
    sample(pictureSpellable,3).forEach(it=>forced.push(makeSpell(it,false)));
    sample(sents.filter(s=>s.en.split(' ').length<=4),1).forEach(s=>forced.push(makeScramble(s)));
    sample(pairs,1).forEach(p=>forced.push(makePair(p,items)));
  } else { // hard
    sample(phon,2).forEach(p=>forced.push(makePhonics(p)));
    sample(spellable,4).forEach(it=>forced.push(makeSpell(it,true)));
    sample(sents,2).forEach(s=>forced.push(makeScramble(s)));
  }

  const others=[];
  shuffle(items).forEach(it=>{
    const types= gDiff==='hard' ? ['en2zh','listen','zh2en'] : ['zh2en','en2zh','listen'];
    if(hasPicture(it) && gDiff!=='hard')types.push('emoji2en');
    others.push(makeItemQ(types[Math.floor(Math.random()*types.length)],it,items));
  });
  const need=Math.max(0,ROUND_LEN-forced.length);
  const round=shuffle(forced.concat(sample(others,need)));
  return round.slice(0,ROUND_LEN);
}

/* ============ 游戏流程 ============ */
let round=[], qi=0, stars=0, locked=false;
const $=id=>document.getElementById(id);

function show(screen){
  ['startScreen','quizScreen','endScreen'].forEach(s=>$(s).classList.add('hide'));
  $(screen).classList.remove('hide');
  const playing = screen==='quizScreen';
  $('bar').style.visibility = screen==='startScreen' ? 'hidden':'visible';
  $('progWrap').style.visibility = playing ? 'visible':'hidden';
  $('qcount').style.visibility = playing ? 'visible':'hidden';
}

function startGame(units){
  if(!ac){try{ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if('speechSynthesis' in window){try{speechSynthesis.resume();}catch(e){}}
  gOptN = gDiff==='easy' ? 3 : 4;
  round=buildRound(units); qi=0; stars=0;
  $('starCount').textContent='0';
  show('quizScreen');
  renderQ();
}

function renderQ(){
  locked=false;
  const q=round[qi];
  $('qtype').textContent=q.type;
  $('qprompt').textContent=q.prompt;
  $('qcount').textContent='第 '+(qi+1)+' / '+round.length+' 题';
  $('progBar').style.width=(qi/round.length*100)+'%';
  // big area
  const big=$('qbig'); big.innerHTML='';
  if(q.big){
    if(q.big.kind==='emoji'){ big.innerHTML='<div class="emoji">'+q.big.text+'</div>'; }
    else if(q.big.kind==='image'){ big.innerHTML='<img class="pic" src="'+q.big.src+'" alt="'+q.big.alt+'">'; }
    else if(q.big.kind==='word'){ big.innerHTML='<div class="word">'+q.big.html+'</div>'; }
    else if(q.big.kind==='speaker'||q.big.kind==='listen'){
      const lbl=q.big.kind==='listen'?'🔊 再听一遍':'🔊 '+q.big.text;
      const b=document.createElement('div'); b.className='speaker'; b.innerHTML=lbl;
      b.onclick=()=>speak(q.speakText); big.appendChild(b);
    }
  }
  const opts=$('opts'); opts.innerHTML=''; opts.style.display='';
  const mode=q.mode||'mc';
  if(mode==='spell') renderSpell(q,opts);
  else if(mode==='scramble') renderScramble(q,opts);
  else renderMC(q,opts);
  $('feedback').classList.remove('show');
  if(q.autoSpeak){ setTimeout(()=>speak(q.speakText),350); }
}

function renderMC(q,opts){
  q.options.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='opt'; btn.innerHTML=o.html;
    btn.onclick=()=>answer(btn,o,q);
    opts.appendChild(btn);
  });
}

function renderSpell(q,opts){
  opts.style.display='block';
  if(q.hintZh){ const h=document.createElement('div'); h.className='hintzh'; h.textContent=q.hintZh; opts.appendChild(h); }
  const slots=document.createElement('div'); slots.className='slots';
  for(let i=0;i<q.word.length;i++){ const s=document.createElement('div'); s.className='slot'; slots.appendChild(s); }
  opts.appendChild(slots);
  const tilesWrap=document.createElement('div'); tilesWrap.className='tiles';
  const placed=[]; // {ch, tileBtn}
  function refresh(){
    [...slots.children].forEach((s,i)=>{ if(placed[i]){s.textContent=placed[i].ch;s.classList.add('filled');}else{s.textContent='';s.classList.remove('filled');} });
  }
  q.tiles.forEach(ch=>{
    const t=document.createElement('button'); t.className='tile'; t.textContent=ch;
    t.onclick=()=>{
      if(locked||placed.length>=q.word.length)return;
      placed.push({ch,tileBtn:t}); t.classList.add('used'); refresh();
      if(placed.length===q.word.length){
        const made=placed.map(p=>p.ch).join('').toLowerCase();
        finishQ(made===q.word.toLowerCase(), q);
      }
    };
    tilesWrap.appendChild(t);
  });
  opts.appendChild(tilesWrap);
  const bar=document.createElement('div'); bar.className='spellbar';
  const del=document.createElement('button'); del.className='minibtn'; del.textContent='⌫ 删除';
  del.onclick=()=>{ if(locked||!placed.length)return; const last=placed.pop(); last.tileBtn.classList.remove('used'); refresh(); };
  bar.appendChild(del);
  opts.appendChild(bar);
}

function renderScramble(q,opts){
  opts.style.display='block';
  const h=document.createElement('div'); h.className='hintzh'; h.textContent=q.hintZh; opts.appendChild(h);
  const ans=document.createElement('div'); ans.className='ansrow'; opts.appendChild(ans);
  const tilesWrap=document.createElement('div'); tilesWrap.className='tiles';
  const placed=[]; // {t, tileBtn}
  function evalIf(){
    if(placed.length===q.tokens.length){
      const made=placed.map(p=>p.t).join(' ');
      finishQ(made===q.tokens.join(' '), q);
    }
  }
  q.tiles.forEach(obj=>{
    const t=document.createElement('button'); t.className='tile wtile'; t.textContent=obj.t;
    t.onclick=()=>{
      if(locked)return;
      t.classList.add('used');
      const chip=document.createElement('span'); chip.className='placed'; chip.textContent=obj.t;
      const rec={t:obj.t,tileBtn:t,chip}; placed.push(rec);
      chip.onclick=()=>{ if(locked)return; const idx=placed.indexOf(rec); if(idx>-1)placed.splice(idx,1); t.classList.remove('used'); chip.remove(); };
      ans.appendChild(chip);
      evalIf();
    };
    tilesWrap.appendChild(t);
  });
  opts.appendChild(tilesWrap);
}

function finishQ(ok,q){
  if(locked)return; locked=true;
  if(ok){ stars++; $('starCount').textContent=stars; beep('good'); confettiBurst(14); }
  else { beep('bad'); }
  if(q.learn&&q.learn.speak)speak(q.learn.speak);
  [...$('opts').querySelectorAll('button')].forEach(b=>b.disabled=true);
  showFeedback(ok,q);
  $('progBar').style.width=((qi+1)/round.length*100)+'%';
}

function answer(btn,o,q){
  if(locked)return; locked=true;
  const btns=[...$('opts').children];
  btns.forEach(b=>b.disabled=true);
  if(o.correct){
    btn.classList.add('correct');
    stars++; $('starCount').textContent=stars;
    beep('good'); confettiBurst(14);
    if(o.speak)speak(o.speak); else if(q.learn&&q.learn.speak)speak(q.learn.speak);
    showFeedback(true,q);
  }else{
    btn.classList.add('wrong'); beep('bad');
    // highlight the correct one
    q.options.forEach((opt,idx)=>{ if(opt.correct) btns[idx].classList.add('correct'); });
    btns.forEach(b=>{ if(!b.classList.contains('correct')&&b!==btn)b.classList.add('dim'); });
    if(q.learn&&q.learn.speak)speak(q.learn.speak);
    showFeedback(false,q);
  }
  $('progBar').style.width=((qi+1)/round.length*100)+'%';
}

function showFeedback(ok,q){
  $('fbEmoji').textContent = ok ? ['🎉','⭐','👍','🥳'][Math.floor(Math.random()*4)] : '💡';
  $('fbText').innerHTML = (ok?'<span style="color:#2e8b57">太棒了！</span>':'<span style="color:#E0592E">再记一下～</span>')
    + '<small>'+q.learn.text+'</small>';
  $('nextBtn').textContent = (qi>=round.length-1) ? '看结果 🏁' : '下一题 ▶';
  $('feedback').classList.add('show');
}

function nextQ(){
  if(qi>=round.length-1){ endGame(); return; }
  qi++; renderQ();
}

function endGame(){
  show('endScreen');
  $('endScore').textContent=stars; $('endTotal').textContent=round.length;
  const pct=stars/round.length;
  let mascot,msg,sub;
  if(pct>=1){mascot='🏆';msg='满分！太厉害啦！';sub='你是今天的英语小冠军 👑';}
  else if(pct>=0.8){mascot='🌟';msg='好棒！就差一点点！';sub='再玩一次，冲满分吧！';}
  else if(pct>=0.5){mascot='😊';msg='做得不错哦！';sub='多玩几次，会越来越熟练～';}
  else {mascot='🐣';msg='没关系，我们再来一遍！';sub='慢慢来，每次都会更厉害。';}
  $('endMascot').textContent=mascot; $('endMsg').textContent=msg; $('endSub').textContent=sub;
  if(pct>=0.8){ confettiBurst(60); beep('good'); }
}

/* ============ 彩带 ============ */
function confettiBurst(n){
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  const colors=['#E0592E','#2A8C86','#F4B739','#4CAF6D','#E86fA0'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.transform='rotate('+Math.random()*360+'deg)';
    document.body.appendChild(c);
    const fall=600+Math.random()*700, drift=(Math.random()-0.5)*180;
    c.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},
               {transform:'translate('+drift+'px,'+(window.innerHeight+60)+'px) rotate(720deg)',opacity:1}],
              {duration:fall+1200,easing:'cubic-bezier(.3,.6,.5,1)'}).onfinish=()=>c.remove();
  }
}

/* ============ 发音设置面板 ============ */
function buildVoiceList(){
  const sel=document.getElementById('voiceSel'); if(!sel)return;
  sel.innerHTML='';
  if(!enVoices.length){
    const o=document.createElement('option');o.textContent='（没找到英语语音，请看下方提示）';o.value='';
    sel.appendChild(o);
    document.getElementById('voiceHint').textContent='这台 iPad 还没有英语语音包。请到「设置 → 辅助功能 → 朗读内容 → 声音 → 英语」下载一个 Enhanced/Premium 版本，再回来刷新本页。';
    return;
  }
  enVoices.forEach((v,i)=>{
    const o=document.createElement('option');o.value=i;
    let tag='';const n=(v.name||'').toLowerCase();
    if(/premium/.test(n))tag=' ⭐高清';else if(/enhanced/.test(n))tag=' ✓增强';else if(/siri/.test(n))tag=' ✓Siri';
    o.textContent=(v.name||v.lang)+'（'+v.lang+'）'+tag;
    if(chosenVoice&&v.name===chosenVoice.name)o.selected=true;
    sel.appendChild(o);
  });
  document.getElementById('voiceHint').innerHTML='清晰度排序：<b>⭐高清(Premium)</b> &gt; ✓增强(Enhanced) &gt; 普通版。带 ⭐/✓ 的最清楚。若列表里只有普通版，去设置里下个 Enhanced 版会好很多。';
}
function rateLabel(r){ return r<=0.6?'很慢':r<=0.75?'慢':r<=0.85?'正常':r<0.95?'稍快':'快'; }
function openSettings(){
  buildVoiceList();
  document.getElementById('rateSel').value=rate;
  document.getElementById('rateVal').textContent=rateLabel(rate);
  document.getElementById('overlay').classList.remove('hide');
  if('speechSynthesis' in window){try{speechSynthesis.resume();}catch(e){}}
}
function closeSettings(){ document.getElementById('overlay').classList.add('hide'); }

/* ============ 事件 ============ */
document.querySelectorAll('.bigbtn[data-units]').forEach(b=>{
  b.onclick=()=>{ const u=b.dataset.units.split('').map(Number); startGame(u); };
});
$('nextBtn').onclick=nextQ;
$('againBtn').onclick=()=>{ const u=round.length?lastUnits:[1,2,3,4,5,6]; startGame(u); };
$('homeBtn').onclick=()=>{ try{speechSynthesis.cancel();}catch(e){} show('startScreen'); };
$('homeBtn2').onclick=()=>show('startScreen');
$('muteBtn').onclick=()=>{ muted=!muted; $('muteBtn').textContent=muted?'🔇':'🔊'; if(muted){try{speechSynthesis.cancel();}catch(e){}} };

// 难度选择
document.querySelectorAll('.diff[data-diff]').forEach(b=>{
  b.onclick=()=>{
    gDiff=b.dataset.diff;
    document.querySelectorAll('.diff').forEach(x=>x.classList.toggle('on',x===b));
  };
});

// 设置面板
$('setBtn').onclick=openSettings;
$('setBtnStart').onclick=openSettings;
$('doneBtn').onclick=closeSettings;
$('overlay').onclick=(e)=>{ if(e.target.id==='overlay')closeSettings(); };
$('voiceSel').onchange=(e)=>{ const i=parseInt(e.target.value,10); if(!isNaN(i)&&enVoices[i]){chosenVoice=enVoices[i];} speak('cake'); };
$('rateSel').oninput=(e)=>{ rate=parseFloat(e.target.value); $('rateVal').textContent=rateLabel(rate); };
$('rateSel').onchange=()=>speak('cake');
$('testBtn').onclick=()=>{ if('speechSynthesis' in window){try{speechSynthesis.resume();}catch(e){}} speak('cake'); };

// remember last chosen units for "再玩一次"
let lastUnits=[1,2,3,4,5,6];
const _start=startGame;
startGame=function(u){ lastUnits=u; _start(u); };

show('startScreen');
</script>
